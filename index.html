<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THAJ HRS | Portfolio</title>
  <link rel="icon" type="image/jpeg" href="assets/thaj-logo 1-modified.png">
  <style>
    /* ── UPDATED THEME TOGGLE BUTTON ── */
    #theme-toggle {
      position: fixed;
      top: 15px;
      right: 20px;
      z-index: 10000;
      background: #ffffff;
      color: #000000;
      border: 1px solid #ddd;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      padding: 0;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    #theme-toggle:hover {
      transform: scale(1.1);
      background: #f0f0f0;
    }
    /* Hide the text label to make it look like an icon */
    #toggle-label { display: none; }
    
    body.dark-mode {
      background-color: #000000 !important;
      filter: invert(1) hue-rotate(180deg);
    }
    body.dark-mode img, body.dark-mode video { filter: invert(1) hue-rotate(180deg); }
    body.dark-mode #theme-toggle { filter: invert(1) hue-rotate(180deg); }

    /* (Rest of your original CSS remains here...) */
  </style>
</head>
<body>

  <!-- Updated Theme Toggle Button -->
  <button id="theme-toggle" aria-label="Toggle dark mode">
    <span id="toggle-icon">🌙</span>
    <span id="toggle-label">Dark Mode</span>
  </button>

  <!-- Rest of your body content... -->

  <script>
    /* ── THEME TOGGLE LOGIC ── */
    const body = document.body;
    const toggleBtn = document.getElementById('theme-toggle');
    const toggleIcon = document.getElementById('toggle-icon');

    const saved = localStorage.getItem('thaj-theme');
    if (saved === 'dark') {
      body.classList.add('dark-mode');
      toggleIcon.textContent = '☀️';
    }

    toggleBtn.addEventListener('click', () => {
      const isDark = body.classList.toggle('dark-mode');
      toggleIcon.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('thaj-theme', isDark ? 'dark' : 'light');
    });
    
    /* (Rest of your JS for AI chatbot remains here...) */
  </script>
</body>
</html>
