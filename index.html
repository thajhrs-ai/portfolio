<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THAJ HRS | Portfolio</title>
  <style>
    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; line-height: 1.6; color: #2d3436; background: #ffffff; }
    .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    .site-header { padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
    .nav__logo { font-weight: 800; font-size: 1.2rem; letter-spacing: 1px; }

    /* Hero Section - Desktop Layout */
    .hero { padding: 80px 0; display: flex; align-items: center; justify-content: space-between; gap: 40px; }
    .hero__content { flex: 1; }
    .hero__name { font-size: 3rem; margin: 10px 0; color: #000; }
    .hero__image-wrap { width: 280px; height: 280px; border-radius: 50%; border: 4px solid #00f2fe; padding: 5px; }
    .hero__image { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

    /* Mobile Responsive Logic */
    @media (max-width: 768px) {
      .hero { flex-direction: column-reverse; text-align: center; padding: 40px 0; }
      .hero__name { font-size: 2.2rem; }
    }

    /* AI Chatbot Styles */
    .ai-chat-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ai-chat-trigger { background: #0f0f11; color: #fff; border: none; border-radius: 50px; padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .ai-window-container { position: fixed; bottom: 110px; right: 25px; width: 320px; height: 400px; background: #16161a; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); display: none; flex-direction: column; overflow: hidden; }
    .ai-messages-body { flex: 1; padding: 15px; overflow-y: auto; color: #fff; font-size: 0.9rem; }
    .ai-msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; }
    .ai-msg-bot { background: #2f2f35; align-self: flex-start; }
    .ai-window-footer { padding: 10px; background: #0f0f11; display: flex; gap: 5px; }
    .ai-window-footer input { flex: 1; padding: 8px; border-radius: 6px; border: none; }
    .ai-window-footer button { padding: 8px 15px; background: #00f2fe; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container nav__logo">THAJ HRS</div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero__content">
        <h1>Hello, I'm</h1>
        <h1 class="hero__name">THAJ HRS</h1>
        <p>Commerce & Tech Enthusiast</p>
        <p style="margin-top: 15px; max-width: 500px;">An ambitious Commerce student combining solid financial literacy with technical database, programming, and advanced office automation skills.</p>
      </div>
      <div class="hero__image-wrap">
        <img class="hero__image" src="assets/thaj%20profile.jpeg" alt="THAJ HRS">
      </div>
    </section>
  </main>

  <div class="ai-chat-wrapper">
    <button id="ai-chat-toggle" class="ai-chat-trigger">Ask AI</button>
    <span style="font-size: 0.65rem; font-weight: bold; opacity: 0.7;">THAJ'S AI ASSISTANT</span>
  </div>

  <div id="ai-chat-window" class="ai-window-container">
    <div style="padding: 15px; background: #0f0f11; color: white; display: flex; justify-content: space-between;">
      <span>AI Assistant</span>
      <button id="ai-chat-close" style="background:none; border:none; color:white; cursor:pointer;">&times;</button>
    </div>
    <div id="ai-chat-messages" class="ai-messages-body">
      <div class="ai-msg ai-msg-bot">Hello! Ask me about Thaj's professional skills or experience.</div>
    </div>
    <div class="ai-window-footer">
      <input type="text" id="ai-chat-input" placeholder="Ask anything...">
      <button id="ai-chat-send">Send</button>
    </div>
  </div>

  <script>
    const chatToggle = document.getElementById('ai-chat-toggle');
    const chatWindow = document.getElementById('ai-chat-window');
    const chatClose = document.getElementById('ai-chat-close');
    const chatInput = document.getElementById('ai-chat-input');
    const chatMessages = document.getElementById('ai-chat-messages');
    const chatSend = document.getElementById('ai-chat-send');

    chatToggle.addEventListener('click', () => { chatWindow.style.display = 'flex'; });
    chatClose.addEventListener('click', () => { chatWindow.style.display = 'none'; });

    const allowedTopics = ['commerce', 'finance', 'accounting', 'bookkeeping', 'tech', 'technology', 'database', 'mysql', 'python', 'web', 'skills'];

    chatSend.addEventListener('click', () => {
      const query = chatInput.value.trim();
      if (!query) return;

      const userMsg = document.createElement('div');
      userMsg.classList.add('ai-msg');
      userMsg.style.background = '#00f2fe';
      userMsg.innerText = query;
      chatMessages.appendChild(userMsg);
      chatInput.value = '';

      setTimeout(() => {
        const botMsg = document.createElement('div');
        botMsg.classList.add('ai-msg', 'ai-msg-bot');
        
        if (allowedTopics.some(topic => query.toLowerCase().includes(topic))) {
          botMsg.innerHTML = `This is a professional topic. I am currently indexing Thaj's data to answer you accurately.`;
        } else {
          botMsg.innerHTML = `<strong>Notice:</strong> I am designed for professional queries related to Thaj's <em>Commerce and Technical expertise</em>. Please ask about his skills or professional background.`;
        }
        chatMessages.appendChild(botMsg);
      }, 500);
    });
  </script>
</body>
</html>
