<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="THAJ HRS — Portfolio and CV">
  <title>THAJ HRS | Portfolio</title>
  <link rel="icon" type="image/jpeg" href="assets/thaj-logo 1-modified.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* CSS Styles included */
    @media (min-width: 769px) {
      .nav__menu { display: flex !important; gap: 12px !important; list-style: none !important; padding: 0 !important; margin: 0 !important; align-items: center !important; }
    }
    .ai-chat-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ai-window-container { position: fixed; bottom: 115px; right: 25px; width: 340px; height: 450px; background: #16161a; border-radius: 16px; display: none; flex-direction: column; overflow: hidden; z-index: 9999; border: 1px solid rgba(255,255,255,0.08); }
    .ai-messages-body { flex: 1; padding: 16px; overflow-y: auto; background: #121214; display: flex; flex-direction: column; gap: 12px; }
    .ai-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; }
    .ai-msg-bot { background: #1f1f24; color: #e1e1e6; align-self: flex-start; }
    .ai-msg-user { background: #00f2fe; color: #000; align-self: flex-end; }
    .ai-window-footer { padding: 12px; background: #0f0f11; display: flex; gap: 8px; }
    .ai-window-footer input { flex: 1; padding: 8px; border-radius: 8px; border: none; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="nav__logo" href="#">THAJ HRS</a>
      <ul class="nav__menu" id="nav-menu">
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#education">Education</a></li>
        <li><a href="#certifications">Certifications</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <section id="about" class="section">
      <div class="container">
        <h2>About Me</h2>
        <p>Commerce student and tech enthusiast based in Sri Lanka.</p>
      </div>
    </section>
    <section id="skills" class="section">
      <div class="container">
        <h2>Skills</h2>
        <p>MySQL, Python, Financial Accounting, Advanced Excel.</p>
      </div>
    </section>
    <section id="education" class="section">
      <div class="container">
        <h2>Education</h2>
        <p>AAT Level 2 (2026), G.C.E. A/L Commerce.</p>
      </div>
    </section>
  </main>

  <div class="ai-chat-wrapper">
    <button id="ai-chat-toggle">Ask AI</button>
  </div>

  <div id="ai-chat-window" class="ai-window-container">
    <div class="ai-messages-body" id="ai-chat-messages">
      <div class="ai-msg ai-msg-bot">Hello! How can I help you today?</div>
    </div>
    <div class="ai-window-footer">
      <input type="text" id="ai-chat-input" placeholder="Ask anything...">
      <button id="ai-chat-send">Send</button>
    </div>
  </div>

  <script>
    const chatToggle = document.getElementById('ai-chat-toggle');
    const chatWindow = document.getElementById('ai-chat-window');
    const chatInput = document.getElementById('ai-chat-input');
    const chatSend = document.getElementById('ai-chat-send');
    const chatMessages = document.getElementById('ai-chat-messages');

    chatToggle.addEventListener('click', () => { 
        chatWindow.style.display = chatWindow.style.display === 'flex' ? 'none' : 'flex'; 
    });

    function appendHtmlMessage(html, sender) {
      const msg = document.createElement('div');
      msg.classList.add('ai-msg', `ai-msg-${sender}`);
      msg.innerHTML = html;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleResponse() {
      const query = chatInput.value;
      if (!query) return;
      const userMsg = document.createElement('div');
      userMsg.classList.add('ai-msg', 'ai-msg-user');
      userMsg.innerText = query;
      chatMessages.appendChild(userMsg);
      chatInput.value = '';
      appendHtmlMessage("I am a prototype assistant for Thaj's portfolio.", 'bot');
    }

    chatSend.addEventListener('click', handleResponse);
  </script>
</body>
</html>
