<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="THAJ HRS — Portfolio and CV">
  <title>THAJ HRS | Portfolio</title>
  <!-- Favicon added here -->
  <link rel="icon" type="image/jpeg" href="assets/123123123.jfif">
  <link rel="stylesheet" href="css/style.css">
  <style>
    @media (min-width: 769px) {
      .nav__menu { display: flex !important; gap: 12px !important; list-style: none !important; padding: 0 !important; margin: 0 !important; align-items: center !important; }
    }
    @media (max-width: 768px) {
      .nav__menu { list-style: none !important; padding: 0 !important; margin: 0 !important; }
      .nav__menu li { width: 100% !important; text-align: center !important; margin-bottom: 8px !important; }
      .nav__menu a { display: block !important; width: 100% !important; }
      .hero__image-wrap { border: 1.5px solid #000000 !important; padding: 4px !important; }
    }
    .contact__link-container { display: inline-flex; align-items: center; gap: 8px; }
    .contact-icon { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }
    
    /* AI Chat Styles */
    .ai-chat-wrapper { position: fixed; bottom: 25px; right: 25px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .ai-chat-trigger { position: relative; background: #0f0f11; color: #ffffff; border: none; border-radius: 50px; padding: 12px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3); transition: all 0.3s ease; }
    .ai-chat-trigger::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50px; padding: 2px; background: linear-gradient(45deg, #00f2fe, #4facfe, #0000ff); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
    .ai-chat-trigger:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(79, 172, 254, 0.5); }
    .ai-chat-icon { width: 18px; height: 18px; fill: #00f2fe; }
    .ai-chat-label-below { font-family: system-ui, -apple-system, sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 1.2px; color: #16161a; text-transform: uppercase; margin-top: 2px; opacity: 0.85; text-align: center; }
    @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .ai-window-container { position: fixed; bottom: 115px; right: 25px; width: 340px; max-width: 90vw; height: 450px; background: #16161a; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 9999; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); font-family: system-ui, -apple-system, sans-serif; animation: slideUpFade 0.4s ease-out; }
    .ai-window-header { background: #0f0f11; color: #fff; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .ai-status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; }
    .ai-close-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; opacity: 0.7; transition: 0.2s; }
    .ai-close-btn:hover { opacity: 1; }
    .ai-messages-body { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #121214; }
    .ai-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; line-height: 1.4; }
    .ai-msg-bot { background: #1f1f24; color: #e1e1e6; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.03); }
    .ai-msg-bot a { color: #00f2fe; text-decoration: underline; font-weight: 600; }
    .ai-section-btn { display: inline-block; margin-top: 8px; background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000 !important; padding: 6px 12px; border-radius: 6px; text-decoration: none !important; font-size: 0.8rem; font-weight: 600; }
    .ai-msg-user { background: linear-gradient(135deg, #00f2fe, #4facfe); color: #000; font-weight: 500; align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai-window-footer { padding: 12px; background: #0f0f11; display: flex; gap: 8px; border-top: 1px solid rgba(255,255,255,0.05); }
    .ai-window-footer input { flex: 1; background: #1c1c21; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; outline: none; }
    .ai-window-footer button { background: #4facfe; color: #000; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="nav" aria-label="Main navigation">
      <a class="nav__logo" href="#">THAJ HRS</a>
      <ul class="nav__menu" id="nav-menu">
        <li><a href="#about">About</a></li>
        <li><a href="#skills">Skills</a></li>
        <li><a href="#education">Education</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <!-- Rest of your section content goes here -->
  </main>

  <div class="ai-chat-wrapper">
    <button id="ai-chat-toggle" class="ai-chat-trigger">Ask AI</button>
  </div>

  <div id="ai-chat-window" class="ai-window-container" style="display: none;">
    <div class="ai-window-header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="ai-status-dot"></div>
        <div><h4>THAJ AI Assistant</h4></div>
      </div>
      <button id="ai-chat-close" class="ai-close-btn">&times;</button>
    </div>
    <div id="ai-chat-messages" class="ai-messages-body">
      <div class="ai-msg ai-msg-bot">Hello! I can scan this page. Ask me about Thaj!</div>
    </div>
    <div class="ai-window-footer">
      <input type="text" id="ai-chat-input" placeholder="Ask anything...">
      <button id="ai-chat-send">Send</button>
    </div>
  </div>

  <script>
    const chatToggle = document.getElementById('ai-chat-toggle');
    const chatWindow = document.getElementById('ai-chat-window');
    const chatClose = document.getElementById('ai-chat-close');
    const chatInput = document.getElementById('ai-chat-input');
    const chatSend = document.getElementById('ai-chat-send');
    const chatMessages = document.getElementById('ai-chat-messages');

    chatToggle.addEventListener('click', () => { chatWindow.style.display = 'flex'; });
    chatClose.addEventListener('click', () => { chatWindow.style.display = 'none'; });

    function appendHtmlMessage(html, sender) {
      const msg = document.createElement('div');
      msg.classList.add('ai-msg', `ai-msg-${sender}`);
      msg.innerHTML = html;
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function handleResponse() {
      const query = chatInput.value.trim();
      if (!query) return;
      // Basic logic to append user query
      const userMsg = document.createElement('div');
      userMsg.classList.add('ai-msg', 'ai-msg-user');
      userMsg.innerText = query;
      chatMessages.appendChild(userMsg);
      chatInput.value = '';
      // Placeholder for your smart response logic
      appendHtmlMessage("I'm ready to help you with Thaj's details!", 'bot');
    }

    chatSend.addEventListener('click', handleResponse);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleResponse(); });
  </script>
</body>
</html>
