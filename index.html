<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THAJ HRS | Portfolio</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ══════════════════════════════════════════
       DARK MODE — FIX FOR HERO & SECTIONS
    ══════════════════════════════════════════ */
    
    /* Force dark background on body and ALL hero-related elements */
    body.dark-mode,
    body.dark-mode .hero,
    body.dark-mode .container,
    body.dark-mode .hero__inner,
    body.dark-mode .hero__content,
    body.dark-mode .section,
    body.dark-mode .section--alt,
    body.dark-mode .site-header,
    body.dark-mode .nav {
      background-color: #0d0d0d !important;
    }

    /* Ensure text in the hero area is white */
    body.dark-mode .hero__greeting,
    body.dark-mode .hero__name,
    body.dark-mode .hero__tagline,
    body.dark-mode .hero__title {
      color: #ffffff !important;
    }

    /* Keep the green accent for the name if desired */
    body.dark-mode .hero__title {
      color: #4ade80 !important;
    }

    /* Hero Image Wrapper background fix */
    body.dark-mode .hero__image-wrap {
      background-color: #0d0d0d !important;
      border-color: #4ade80 !important;
    }

    /* Standard Cards Dark Mode */
    body.dark-mode .card {
      background-color: #161616 !important;
      border-color: #2a2a2a !important;
    }
    
    /* ... (Rest of your original CSS remains the same) ... */
  </style>
</head>
<body>
  <!-- Your existing body content goes here -->
  <header class="site-header">
    <nav class="nav">
       <a class="nav__logo" href="#">THAJ HRS</a>
       <!-- Menu items... -->
    </nav>
  </header>
  
  <main id="main">
    <section class="hero">
      <div class="container hero__inner">
        <div class="hero__content">
           <p class="hero__greeting">Hello, I'm</p>
           <h1 class="hero__name">THAJ HRS</h1>
           <p class="hero__title">Commerce & Tech Enthusiast</p>
           <!-- Rest of content -->
        </div>
      </div>
    </section>
    <!-- Rest of your page -->
  </main>

  <script>
    /* Ensure your existing theme toggle script remains at the bottom */
    const body = document.body;
    function applyTheme(isDark) {
      if (isDark) {
        body.classList.add('dark-mode');
      } else {
        body.classList.remove('dark-mode');
      }
      localStorage.setItem('thaj-theme', isDark ? 'dark' : 'light');
    }
    applyTheme(localStorage.getItem('thaj-theme') === 'dark');
  </script>
</body>
</html>
